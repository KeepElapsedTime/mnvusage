<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>mnvusage</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: #222;
      --text: #e0e0e0;
      --muted: #666;
      --accent: #00d4aa;
      --red: #ef5350;
      --yellow: #ffd54f;
      --blue: #42a5f5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', monospace, system-ui, sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: .85rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    header h1 { font-size: .9rem; font-weight: 700; color: var(--accent); }
    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
    .countdown { font-size: .75rem; color: var(--muted); }
    #refresh-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: .3rem .7rem; border-radius: 4px; cursor: pointer; font-size: .75rem;
      font-family: inherit;
    }
    #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
    #settings-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: .3rem .7rem; border-radius: 4px; cursor: pointer; font-size: .75rem;
      font-family: inherit;
    }
    #settings-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Main layout ── */
    main { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }

    /* ── Section labels ── */
    .section-label {
      font-size: .7rem; letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent); margin-bottom: .75rem;
    }

    /* ── GPU grid ── */
    .gpu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
    .gpu-card { background: var(--surface); padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    .gpu-title { display: flex; align-items: center; gap: .6rem; }
    .gpu-name { font-size: .85rem; font-weight: 600; color: #fff; }
    .temp-badge {
      font-size: .7rem; padding: .15rem .45rem; border-radius: 3px;
      font-weight: 600; margin-left: auto;
    }
    .temp-cool { background: rgba(66,165,245,.15); color: var(--blue); border: 1px solid rgba(66,165,245,.3); }
    .temp-warm { background: rgba(255,213,79,.15); color: var(--yellow); border: 1px solid rgba(255,213,79,.3); }
    .temp-hot  { background: rgba(239,83,80,.15);  color: var(--red);    border: 1px solid rgba(239,83,80,.3); }

    /* ── Usage bars ── */
    .bars { display: flex; flex-direction: column; gap: .6rem; }
    .bar-row { display: flex; flex-direction: column; gap: .25rem; }
    .bar-label { display: flex; justify-content: space-between; font-size: .72rem; color: var(--muted); }
    .bar-track {
      height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 3px;
      transition: width .5s ease;
    }
    .bar-gpu  { background: var(--accent); }
    .bar-vram { background: var(--blue); }

    /* ── Charts ── */
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .chart-box { background: var(--surface2); border: 1px solid var(--border); padding: .75rem; border-radius: 4px; }
    .chart-title { font-size: .68rem; color: var(--muted); margin-bottom: .4rem; text-align: center; }
    .chart-box canvas { max-height: 110px; }

    /* ── Process table ── */
    .proc-wrap { max-height: 120px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .3rem .5rem; font-size: .72rem; }
    th { color: var(--muted); border-bottom: 1px solid var(--border); }
    td { color: var(--text); border-bottom: 1px solid rgba(255,255,255,.04); }
    tr:last-child td { border-bottom: none; }

    /* ── Ollama models ── */
    .model-section { background: var(--surface); border: 1px solid var(--border); padding: 1.25rem; }
    .model-group { margin-bottom: 1rem; }
    .model-source { font-size: .68rem; color: var(--muted); margin-bottom: .5rem; }
    .model-pills { display: flex; flex-wrap: wrap; gap: .4rem; }
    .pill {
      font-size: .75rem; padding: .25rem .65rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text);
    }
    .no-models { color: var(--muted); font-size: .8rem; }
    .api-error { font-size: .72rem; color: var(--red); margin-top: .5rem; }

    /* ── Settings panel ── */
    #settings-panel {
      display: none;
      position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 100; align-items: center; justify-content: center;
    }
    #settings-panel.open { display: flex; }
    .settings-box {
      background: var(--surface); border: 1px solid var(--border);
      padding: 1.5rem; width: min(480px, 90vw); border-radius: 6px;
    }
    .settings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .settings-header h2 { font-size: .9rem; color: #fff; }
    .close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; }
    .url-list { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1rem; }
    .url-row { display: flex; gap: .4rem; align-items: center; }
    .url-input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: .4rem .6rem; border-radius: 4px;
      font-size: .8rem; font-family: inherit; outline: none;
    }
    .url-input:focus { border-color: var(--accent); }
    .del-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      width: 26px; height: 26px; border-radius: 4px; cursor: pointer;
      font-size: .8rem; display: flex; align-items: center; justify-content: center;
    }
    .del-btn:hover { border-color: var(--red); color: var(--red); }
    .settings-actions { display: flex; gap: .5rem; justify-content: space-between; align-items: center; }
    .add-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: .35rem .7rem; border-radius: 4px; cursor: pointer;
      font-size: .75rem; font-family: inherit;
    }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .save-btn {
      background: var(--accent); color: #000; border: none;
      padding: .35rem .9rem; border-radius: 4px; cursor: pointer;
      font-size: .8rem; font-weight: 600; font-family: inherit;
    }
    .save-btn:hover { opacity: .85; }
    .save-msg { font-size: .75rem; color: var(--accent); }

    @media (max-width: 500px) {
      .gpu-grid { grid-template-columns: 1fr; }
      .charts { grid-template-columns: 1fr; }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="pulse" id="status-dot"></div>
  <h1>mnvusage</h1>
  <div class="header-right">
    <span class="countdown" id="countdown"></span>
    <button id="refresh-btn" onclick="refresh()">↺ Refresh</button>
    <button id="settings-btn" onclick="openSettings()">⚙ Settings</button>
  </div>
</header>

<!-- Settings panel -->
<div id="settings-panel">
  <div class="settings-box">
    <div class="settings-header">
      <h2>Ollama API URLs</h2>
      <button class="close-btn" onclick="closeSettings()">✕</button>
    </div>
    <div class="url-list" id="url-list"></div>
    <div class="settings-actions">
      <button class="add-btn" onclick="addUrlRow()">+ Add URL</button>
      <div style="display:flex;align-items:center;gap:.75rem">
        <span class="save-msg" id="save-msg"></span>
        <button class="save-btn" onclick="saveUrls()">Save</button>
      </div>
    </div>
  </div>
</div>

<main>
  <div>
    <p class="section-label">GPU</p>
    <div class="gpu-grid" id="gpu-container">
      <div style="padding:1.25rem;color:var(--muted)">Loading...</div>
    </div>
  </div>
  <div>
    <p class="section-label">Ollama Models</p>
    <div class="model-section" id="models-container">
      <span class="no-models">Loading...</span>
    </div>
  </div>
</main>

<script>
let refreshTimer = 30;
let timerInterval = null;
let charts = {};

// ── Data ──────────────────────────────────────────────────────────────────────

function refresh() {
  clearInterval(timerInterval);
  refreshTimer = 30;
  fetchData();
  startTimer();
}

function startTimer() {
  timerInterval = setInterval(() => {
    refreshTimer--;
    document.getElementById('countdown').textContent = `next update in ${refreshTimer}s`;
    if (refreshTimer <= 0) refresh();
  }, 1000);
}

async function fetchData() {
  try {
    const res = await fetch('/gpu_data');
    const data = await res.json();
    renderGPUs(data.gpus || []);
    renderModels(data.ollama_models || [], data.api_errors || []);
    document.getElementById('status-dot').style.background = 'var(--accent)';
    document.getElementById('status-dot').style.boxShadow = '0 0 6px var(--accent)';
  } catch(e) {
    document.getElementById('status-dot').style.background = 'var(--red)';
    document.getElementById('status-dot').style.boxShadow = '0 0 6px var(--red)';
    console.error('fetchData error:', e);
  }
}

// ── GPU rendering ─────────────────────────────────────────────────────────────

function tempClass(t) {
  if (t < 60) return 'temp-cool';
  if (t < 80) return 'temp-warm';
  return 'temp-hot';
}

function renderGPUs(gpus) {
  const container = document.getElementById('gpu-container');
  if (!gpus.length) {
    container.innerHTML = '<div style="padding:1.25rem;color:var(--muted)">No GPU detected.</div>';
    return;
  }

  // Destroy old charts
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  container.innerHTML = gpus.map(gpu => {
    const memPct = (gpu.memory_used / gpu.memory_total * 100).toFixed(1);
    const procs = gpu.processes || [];
    return `
    <div class="gpu-card">
      <div class="gpu-title">
        <span class="gpu-name">${gpu.name}</span>
        <span class="temp-badge ${tempClass(gpu.temperature)}">${gpu.temperature}°C</span>
      </div>

      <div class="bars">
        <div class="bar-row">
          <div class="bar-label"><span>GPU Load</span><span>${gpu.load}%</span></div>
          <div class="bar-track"><div class="bar-fill bar-gpu" style="width:${gpu.load}%"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-label"><span>VRAM</span><span>${gpu.memory_used} / ${gpu.memory_total} MB (${memPct}%)</span></div>
          <div class="bar-track"><div class="bar-fill bar-vram" style="width:${memPct}%"></div></div>
        </div>
      </div>

      <div class="charts">
        <div class="chart-box">
          <div class="chart-title">GPU Load</div>
          <canvas id="chart-load-${gpu.id}"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title">VRAM Usage</div>
          <canvas id="chart-mem-${gpu.id}"></canvas>
        </div>
      </div>

      <div class="proc-wrap">
        <table>
          <thead><tr><th>PID</th><th>VRAM (MB)</th><th>Process</th></tr></thead>
          <tbody>
            ${procs.length ? procs.map(p => `
              <tr><td>${p.pid}</td><td>${p.memory}</td><td>${p.name}</td></tr>
            `).join('') : '<tr><td colspan="3" style="color:var(--muted)">No running processes</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  // Build charts after DOM is ready
  gpus.forEach(gpu => {
    const memPct = gpu.memory_used / gpu.memory_total * 100;
    charts[`load-${gpu.id}`] = makeDonut(`chart-load-${gpu.id}`, gpu.load, 100 - gpu.load, '#00d4aa');
    charts[`mem-${gpu.id}`]  = makeDonut(`chart-mem-${gpu.id}`,  memPct,  100 - memPct,  '#42a5f5');
  });
}

function makeDonut(id, used, free, color) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type: 'doughnut',
    data: {
      datasets: [{
        data: [used, free],
        backgroundColor: [color, 'rgba(255,255,255,.06)'],
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      cutout: '72%',
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
      animation: { duration: 400 },
    },
    plugins: [{
      id: 'centerLabel',
      afterDraw(chart) {
        const { ctx, width, height } = chart;
        ctx.save();
        ctx.font = 'bold 14px monospace';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(`${used.toFixed(1)}%`, width / 2, height / 2);
        ctx.restore();
      }
    }]
  });
}

// ── Models rendering ──────────────────────────────────────────────────────────

function renderModels(models, errors) {
  const container = document.getElementById('models-container');

  if (!models.length && !errors.length) {
    container.innerHTML = '<span class="no-models">No models found. Configure API URLs in Settings.</span>';
    return;
  }

  const bySource = {};
  models.forEach(m => {
    const src = m.source || 'unknown';
    (bySource[src] = bySource[src] || []).push(m);
  });

  let html = Object.entries(bySource).map(([src, list]) => `
    <div class="model-group">
      <div class="model-source">${src}</div>
      <div class="model-pills">
        ${list.map(m => `<span class="pill" title="${modelTooltip(m)}">${m.name || 'unnamed'}</span>`).join('')}
      </div>
    </div>
  `).join('');

  if (errors.length) {
    html += errors.map(e => `<div class="api-error">⚠ ${e}</div>`).join('');
  }

  container.innerHTML = html;
}

function modelTooltip(m) {
  if (!m.details) return m.modified_at ? `Modified: ${new Date(m.modified_at).toLocaleDateString()}` : '';
  const size = m.size ? `${(m.size/1024/1024/1024).toFixed(2)} GB` : '';
  return [size, m.details.parameter_size, m.details.quantization_level].filter(Boolean).join(' · ');
}

// ── Settings ──────────────────────────────────────────────────────────────────

let currentUrls = [];

async function openSettings() {
  try {
    const res = await fetch('/gpu_data');
    const data = await res.json();
    currentUrls = [...(data.api_urls || [])];
  } catch { currentUrls = []; }

  renderUrlList();
  document.getElementById('settings-panel').classList.add('open');
  document.getElementById('save-msg').textContent = '';
}

function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
}

function renderUrlList() {
  const list = document.getElementById('url-list');
  list.innerHTML = currentUrls.map((url, i) => `
    <div class="url-row">
      <input class="url-input" type="url" value="${url}" placeholder="https://your-ollama-host/api/tags"
        oninput="currentUrls[${i}]=this.value"/>
      <button class="del-btn" onclick="removeUrl(${i})">✕</button>
    </div>
  `).join('') || '<div style="color:var(--muted);font-size:.8rem">No URLs configured.</div>';
}

function addUrlRow() {
  currentUrls.push('');
  renderUrlList();
}

function removeUrl(i) {
  currentUrls.splice(i, 1);
  renderUrlList();
}

async function saveUrls() {
  const urls = currentUrls.filter(u => u.trim());
  try {
    const res = await fetch('/update_urls', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls }),
    });
    const data = await res.json();
    const msg = document.getElementById('save-msg');
    if (data.success) {
      msg.textContent = 'Saved ✓';
      msg.style.color = 'var(--accent)';
      setTimeout(() => closeSettings(), 800);
      refresh();
    } else {
      msg.textContent = data.message || 'Error';
      msg.style.color = 'var(--red)';
    }
  } catch(e) {
    document.getElementById('save-msg').textContent = 'Network error';
  }
}

// Close panel on backdrop click
document.getElementById('settings-panel').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

// ── Init ──────────────────────────────────────────────────────────────────────

fetchData();
startTimer();
</script>
</body>
</html>
